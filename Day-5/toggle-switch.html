<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Toggle Switch</title>
  </head>

  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;

      cursor: pointer;
      background-color: #ccc;
      border-radius: 34px;
      transition: background-color 0.4s;
    }

    /* Shape lingkaran tengah */
    .slider::after {
      content: "";
      position: absolute;
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      border-radius: 50%;
      background-color: white;

      transition: transform 0.4s;
    }

    .toggle input:checked + .slider {
      background-color: green;
    }

    .toggle input:checked + .slider::after {
      transform: translateX(26px);
    }
  </style>

  <body>
    <label class="toggle">
      <input type="checkbox" />
      <span class="slider"></span>
    </label>
  </body>
</html>
