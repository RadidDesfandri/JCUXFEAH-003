<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    a:link {
      color: red;
    }

    a:hover {
      color: yellow;
    }

    a:visited {
      color: green;
    }

    a:active {
      color: deeppink;
    }

    p::first-letter {
      font-size: 2em;
    }

    p::first-line {
      color: red;
    }

    p::before {
      content: "👋";
    }

    p::after {
      content: "✅";
    }
  </style>
  <body>
    <a href="font.html">Click me</a>
    <p>Lorem ipsum dolor sit amet</p>
  </body>
</html>
