<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute</title>
  </head>

  <style>
    .relative {
      position: relative;
    }

    .absolute {
      position: absolute;
      border: 1px solid black;
      background-color: white;
      border-radius: 8px;
      color: black;
      padding: 6px 10px;

      bottom: 50px;
      right: 0px;
    }

    .card {
      position: relative;
      border: 1px solid black;
      padding: 24px;
      width: 300px;
      border-radius: 20px;
      /* overflow: hidden; */
    }
  </style>

  <body>
    <h2>Position absolute</h2>

    <div class="card">
      <div class="absolute">pending</div>
      Card content
    </div>

    <!-- <div class="relative">Content relative here</div> -->
  </body>
</html>
