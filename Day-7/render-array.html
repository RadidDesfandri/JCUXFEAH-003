<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render Array to HTML</title>
  </head>

  <style>
    #product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: white;
      border-radius: 10px;
      border: 1px solid black;
      padding: 18px;
    }
  </style>

  <body>
    <div id="product-list"></div>

    <script>
      const products = [
        { name: "Mouse", price: 250000 },
        { name: "Keyboard", price: 350000 },
        { name: "Monitor", price: 1600000 },
      ];

      const container = document.querySelector("#product-list");

      products.forEach((product) => {
        // 1. Bikin card didalam container
        const card = document.createElement("div");

        // 2. Tambahkan class untuk card
        card.classList.add("product-card");

        // 3. Fill content
        card.innerHTML = `
            <h3>${product.name}</h3>
            <p>Rp. ${product.price.toLocaleString()}</p>
        `;

        // 4. Masukkan data ke container(append)
        container.appendChild(card);
      });
    </script>
  </body>
</html>
