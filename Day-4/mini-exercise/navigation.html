<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation</title>
  </head>

  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    .nav-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: white;
      border-bottom: 0.5px solid lightgray;
      padding: 16px 44px;
    }

    .logo {
      display: flex;
    }

    .logo span {
      font-weight: 700;
    }

    .logo span:nth-child(2) {
      color: blue;
    }

    ul {
      list-style: none; /* Menghilangkan bullet point */
      margin: 0; /* Menghapus margin luar */
      padding: 0; /* Menghapus padding dalam */
    }

    li {
      margin: 0;
      padding: 0;
    }

    .container-item ul {
      display: flex;
      gap: 10px;
    }

    .container-action {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .container-action a {
      text-decoration: none;
    }

    .container-action a:nth-child(2) {
      padding: 8px;
      background-color: blue;
      color: white;
      border-radius: 16px;
    }

    .main-content {
      padding-top: 60px;
    }
  </style>

  <body>
    <!-- Navigation bar -->
    <nav class="nav-container">
      <div class="nav-content">
        <!-- Logo section -->
        <main class="logo">
          <span>Agenty</span>
          <span>Pro</span>
        </main>

        <!-- Item -->
        <main class="container-item">
          <ul>
            <li>Feature</li>
            <li>Solution</li>
            <li>Pricing</li>
            <li>Resource</li>
          </ul>
        </main>

        <main class="container-action">
          <a href="#">Sign in</a>
          <a href="#">Get Started</a>
        </main>
      </div>
    </nav>

    <div class="main-content">Content</div>
  </body>
</html>
