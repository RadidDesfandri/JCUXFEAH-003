<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font</title>
  </head>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    p {
      color: black;
      font-family: Arial, Helvetica, sans-serif;
      font-style: italic;
      text-transform: uppercase;
      text-decoration: line-through;
      text-shadow: -4px 4px 4px black;
      line-height: 50%;
      letter-spacing: 8px;
      word-spacing: 16px;
      text-align: end;
    }
  </style>

  <body>
    <p>Hello world</p>
  </body>
</html>
