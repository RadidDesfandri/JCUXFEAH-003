<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    a {
      text-decoration: none;
      color: black;
      font-family: Arial, Helvetica, sans-serif;
    }

    a::after {
      content: "";
      display: block;
      height: 2px;
      background: black;
      width: 0;
      transition: width 0.3s ease;
    }

    a:hover::after {
      width: 100%;
    }
  </style>

  <body>
    <div style="display: flex">
      <a href="#">Hover me</a>
    </div>
  </body>
</html>
