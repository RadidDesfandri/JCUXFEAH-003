<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex</title>
  </head>

  <style>
    body {
      margin: 0;
    }

    .container {
      display: flex;
      /* flex-direction: row; */
      width: 600px;
      height: 600px;
      margin: 0;
      flex-wrap: wrap;
    }

    .container div {
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* border: 1px solid lightblue; */
      background: pink;
      /* padding: 20px; */
      width: 33.33%;
      height: 33.33%;
      color: white;
    }

    .container div:nth-child(even) {
      background: lightblue;
      /* border: 1px solid pink; */
    }
  </style>

  <body>
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
    </div>
  </body>
</html>
