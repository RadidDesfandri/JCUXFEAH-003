<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
  </head>

  <style>
    body {
      text-align: center;
      color: white;
      margin: auto;
    }

    #content {
      max-width: 960px;
      margin: 0;

      /* Grid */
      display: grid;
      /* Menggunakan percentage */
      /* grid-template-columns: 30% 30% 30%; */

      /* Menggunakan fraction */
      /* grid-template-columns: 1fr 1fr 1fr; */

      grid-template-columns: repeat(3, 1fr);

      /* grid-template-rows: 100px 200px 300px; */
      /* grid-auto-rows: 200px; */

      /* Gap, Column Gap, Row Gap */
      gap: 5px;
      /* column-gap: 20px;
      row-gap: 5px; */
    }

    #content div {
      background: lightskyblue;
      padding: 20px;
    }

    #content div:nth-child(even) {
      background: pink;
    }

    #content div:nth-child(1) {
      grid-column-start: 1;
      grid-column-end: 4;
    }

    #content div:nth-child(2) {
      grid-column: 4 / 8;
    }
  </style>

  <body>
    <div id="content">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
    </div>
  </body>
</html>
